<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}USG CHESS{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chess.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="crt">
  <canvas id="star-canvas"></canvas>
  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-usg">USG</span><span class="logo-name">ISHIMURA</span>
        <span class="logo-sub">// CHESS TERMINAL</span>
      </div>
      <nav>
        <a href="{{ url_for('index') }}">LOBBY</a>
        <a href="{{ url_for('profile', username=user) }}">{{ user }}</a>
      </nav>
    </header>
    {% block content %}{% endblock %}
  </div>
  <script>
    // Starfield
    (function() {
      const c = document.getElementById('star-canvas');
      const ctx = c.getContext('2d');
      let stars = [];
      function resize() {
        c.width = window.innerWidth;
        c.height = window.innerHeight;
      }
      function init() {
        stars = Array.from({length: 120}, () => ({
          x: Math.random() * c.width,
          y: Math.random() * c.height,
          r: Math.random() * 1.2,
          o: Math.random() * 0.5 + 0.1,
        }));
      }
      function draw() {
        ctx.clearRect(0, 0, c.width, c.height);
        stars.forEach(s => {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(110,200,230,${s.o})`;
          ctx.fill();
        });
      }
      resize(); init(); draw();
      window.addEventListener('resize', () => { resize(); init(); draw(); });
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
