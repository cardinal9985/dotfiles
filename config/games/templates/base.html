<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}USG REC{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/games.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chess.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="crt">
  <canvas id="star-canvas"></canvas>
  <div id="toast-stack"></div>
  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-usg">USG</span><span class="logo-name">ISHIMURA</span>
        <span class="logo-sub">// REC DECK</span>
      </div>
      <nav>
        <a href="{{ url_for('hub') }}">HUB</a>
        <a href="{{ url_for('leaderboard') }}">RANKINGS</a>
        <a href="{{ url_for('profile', username=user) }}" title="{{ user }}">DOSSIER</a>
      </nav>
    </header>
    {% block content %}{% endblock %}
  </div>
  <script>
    // Shared toast helper - callable from any game page as showToast(...)
    window.showToast = function(title, body, kind) {
      const stack = document.getElementById('toast-stack');
      if (!stack) return;
      const el = document.createElement('div');
      el.className = 'toast' + (kind ? ' ' + kind : '');
      const t = document.createElement('div'); t.className = 'toast-title'; t.textContent = title;
      const b = document.createElement('div'); b.className = 'toast-body';  b.textContent = body;
      el.appendChild(t); el.appendChild(b);
      stack.appendChild(el);
      setTimeout(() => {
        el.classList.add('fade-out');
        setTimeout(() => el.remove(), 300);
      }, 3200);
    };

  </script>
  <script src="{{ url_for('static', filename='js/starfield.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
