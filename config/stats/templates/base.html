<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Stats{% endblock %} - ISHIMURA.LOL</title>
<link rel="icon" type="image/png" href="/ishimura-favicon.png">
<style>
  :root {
    --black: #080c14;
    --white: #a0aec0;
    --bright-white: #dce4f0;
    --cyan: #3a9fbf;
    --bright-cyan: #6ec8e6;
    --magenta: #7b68c8;
    --bright-magenta: #a78bfa;
    --green: #3d9b8f;
    --bright-green: #5eead4;
    --yellow: #b89040;
    --bright-yellow: #fbbf60;
    --blue: #4070c8;
    --bright-blue: #7aa2f7;
    --red: #8b3a50;
    --bright-red: #f0708a;
    --surface: #0e1320;
    --surface-light: #141a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: "Courier New", "Lucida Console", monospace;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }

  .crt::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.06) 2px,
      rgba(0, 0, 0, 0.06) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  #star-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 700px;
    padding: 2rem;
    margin-top: 1rem;
    margin-bottom: 2rem;
  }

  .header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .header h1 {
    color: var(--bright-cyan);
    font-size: 1.5rem;
    letter-spacing: 0.15em;
  }

  .header .subtitle {
    color: var(--cyan);
    font-size: 0.8rem;
    margin-top: 0.5rem;
  }

  .header .user-tag {
    color: var(--bright-green);
    font-size: 0.75rem;
    margin-top: 0.3rem;
  }

  nav {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  nav a {
    color: var(--cyan);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    padding: 0.3rem 0.6rem;
    border: 1px solid transparent;
    transition: all 0.2s;
  }

  nav a:hover, nav a.active {
    color: var(--bright-cyan);
    border-color: var(--cyan);
  }

  .box {
    border: 1px solid var(--cyan);
    padding: 1.5rem;
    background: var(--surface);
    margin-bottom: 1.5rem;
  }

  .box .title {
    color: var(--bright-cyan);
    font-size: 0.85rem;
    margin-bottom: 1.25rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--surface-light);
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
  }

  .stat-card {
    background: var(--surface-light);
    padding: 1rem;
    text-align: center;
  }

  .stat-card .value {
    font-size: 1.8rem;
    color: var(--bright-cyan);
    font-weight: bold;
  }

  .stat-card .label {
    font-size: 0.7rem;
    color: var(--white);
    margin-top: 0.3rem;
    letter-spacing: 0.1em;
  }

  .stat-card.magenta .value { color: var(--bright-magenta); }
  .stat-card.green .value { color: var(--bright-green); }
  .stat-card.yellow .value { color: var(--bright-yellow); }
  .stat-card.blue .value { color: var(--bright-blue); }
  .stat-card.red .value { color: var(--bright-red); }

  .list-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
  }

  .list-table th {
    color: var(--bright-cyan);
    text-align: left;
    padding: 0.4rem 0.6rem;
    border-bottom: 1px solid var(--cyan);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .list-table td {
    padding: 0.4rem 0.6rem;
    border-bottom: 1px solid var(--surface-light);
    color: var(--white);
    vertical-align: middle;
  }

  .list-table tr:hover td {
    background: var(--surface-light);
  }

  .rank {
    color: var(--bright-cyan);
    font-weight: bold;
    width: 2rem;
    text-align: center;
  }

  .source-tag {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.15rem 0.4rem;
    letter-spacing: 0.05em;
    font-weight: bold;
  }

  .source-tag.jellyfin { background: var(--magenta); color: var(--bright-white); }
  .source-tag.navidrome { background: var(--green); color: var(--black); }
  .source-tag.romm { background: var(--blue); color: var(--bright-white); }
  .source-tag.booklore { background: var(--yellow); color: var(--black); }

  .type-tag {
    display: inline-block;
    font-size: 0.6rem;
    padding: 0.1rem 0.3rem;
    color: var(--bright-yellow);
    border: 1px solid var(--yellow);
  }

  .empty {
    color: var(--white);
    font-size: 0.8rem;
    text-align: center;
    padding: 1rem;
    opacity: 0.6;
  }

  .btn {
    background: var(--cyan);
    color: var(--black);
    border: none;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: bold;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: background 0.2s;
  }

  .btn:hover { background: var(--bright-cyan); }

  .btn-sm {
    font-size: 0.65rem;
    padding: 0.25rem 0.5rem;
  }

  .btn-magenta { background: var(--magenta); }
  .btn-magenta:hover { background: var(--bright-magenta); }

  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.7rem;
  }

  .bar-label {
    min-width: 80px;
    text-align: right;
    color: var(--bright-white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-fill {
    height: 16px;
    background: var(--cyan);
    transition: width 0.3s;
    min-width: 2px;
  }

  .bar-fill.magenta { background: var(--magenta); }
  .bar-fill.green { background: var(--green); }
  .bar-fill.blue { background: var(--blue); }

  .bar-count {
    color: var(--white);
    min-width: 30px;
  }

  .section-title {
    color: var(--bright-magenta);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    margin-top: 0.5rem;
  }

  .footer {
    text-align: center;
    margin-top: 1.25rem;
    font-size: 0.75rem;
  }

  .footer a {
    color: var(--cyan);
    text-decoration: none;
  }

  .footer a:hover {
    color: var(--bright-cyan);
  }

  .pagination {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 1rem;
  }

  .pagination a {
    color: var(--cyan);
    text-decoration: none;
    font-size: 0.8rem;
    padding: 0.3rem 0.6rem;
    border: 1px solid var(--surface-light);
  }

  .pagination a:hover {
    border-color: var(--cyan);
    color: var(--bright-cyan);
  }

  .filter-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .filter-bar a {
    color: var(--white);
    text-decoration: none;
    font-size: 0.7rem;
    padding: 0.2rem 0.5rem;
    border: 1px solid var(--surface-light);
  }

  .filter-bar a:hover, .filter-bar a.active {
    border-color: var(--cyan);
    color: var(--bright-cyan);
  }

  .field {
    margin-bottom: 0.8rem;
  }

  .field label {
    display: block;
    color: var(--bright-white);
    font-size: 0.7rem;
    margin-bottom: 0.2rem;
    letter-spacing: 0.1em;
  }

  .field input, .field select {
    width: 100%;
    background: var(--black);
    border: 1px solid var(--surface-light);
    color: var(--bright-white);
    font-family: inherit;
    font-size: 0.8rem;
    padding: 0.4rem 0.5rem;
    outline: none;
  }

  .field input:focus, .field select:focus {
    border-color: var(--bright-cyan);
  }

  .inline-form {
    display: flex;
    gap: 0.5rem;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .inline-form .field {
    margin-bottom: 0;
  }
</style>
</head>
<body class="crt">
<canvas id="star-canvas"></canvas>
<div class="container">
  <div class="header">
    <h1>ISHIMURA.LOL</h1>
    <div class="subtitle">// MEDIA STATS TERMINAL</div>
    {% if user %}<div class="user-tag">LOGGED IN: {{ user|upper }}</div>{% endif %}
  </div>

  <nav>
    <a href="/" class="{{ 'active' if request.path == '/' }}">DASHBOARD</a>
    <a href="/wrapped" class="{{ 'active' if request.path == '/wrapped' }}">WRAPPED</a>
    <a href="/history" class="{{ 'active' if request.path == '/history' }}">HISTORY</a>
    <a href="/admin" class="{{ 'active' if request.path == '/admin' }}">ADMIN</a>
  </nav>

  {% block content %}{% endblock %}

  <div class="footer">
    <a href="https://ishimura.lol">&lt; BACK TO ISHIMURA.LOL</a>
  </div>
</div>
<script>
var starCanvas = document.getElementById('star-canvas');
var sCtx = starCanvas.getContext('2d');
var stars = [];
var shootingStars = [];

function initStarfield() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  stars = [];
  for (var i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height,
      r: Math.random() * 1.5 + 0.3,
      brightness: Math.random() * 0.5 + 0.3,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
}
initStarfield();
window.addEventListener('resize', initStarfield);

function spawnShootingStar() {
  shootingStars.push({
    x: Math.random() * starCanvas.width * 0.8,
    y: Math.random() * starCanvas.height * 0.4,
    vx: 4 + Math.random() * 6,
    vy: 2 + Math.random() * 3,
    life: 1.0,
    length: 40 + Math.random() * 60
  });
}

function drawStarfield(time) {
  sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    var twinkle = 0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset);
    var alpha = s.brightness * twinkle;
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = 'rgba(170, 200, 240, ' + alpha + ')';
    sCtx.fill();
  }
  for (var j = shootingStars.length - 1; j >= 0; j--) {
    var ss = shootingStars[j];
    ss.x += ss.vx;
    ss.y += ss.vy;
    ss.life -= 0.015;
    if (ss.life <= 0 || ss.x > starCanvas.width || ss.y > starCanvas.height) {
      shootingStars.splice(j, 1);
      continue;
    }
    var trail = ss.length / 6;
    var grad = sCtx.createLinearGradient(ss.x, ss.y, ss.x - ss.vx * trail, ss.y - ss.vy * trail);
    grad.addColorStop(0, 'rgba(160, 200, 255, ' + ss.life * 0.8 + ')');
    grad.addColorStop(1, 'rgba(160, 200, 255, 0)');
    sCtx.beginPath();
    sCtx.moveTo(ss.x, ss.y);
    sCtx.lineTo(ss.x - ss.vx * trail, ss.y - ss.vy * trail);
    sCtx.strokeStyle = grad;
    sCtx.lineWidth = 1.5;
    sCtx.stroke();
  }
  if (Math.random() < 0.003) spawnShootingStar();
  requestAnimationFrame(drawStarfield);
}
requestAnimationFrame(drawStarfield);
</script>
</body>
</html>
